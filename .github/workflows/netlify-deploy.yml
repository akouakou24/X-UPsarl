name: Déploiement Netlify

# Déclenchement : à chaque push sur main + sur les pull requests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    name: Déployer sur Netlify
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Validation HTML rapide
        run: |
          python3 - <<'PY'
          from html.parser import HTMLParser
          import os, sys
          VOID = {'area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr'}
          class V(HTMLParser):
              def __init__(s): super().__init__(); s.stack=[]; s.err=[]
              def handle_starttag(s,t,a):
                  if t not in VOID: s.stack.append(t)
              def handle_endtag(s,t):
                  if s.stack and s.stack[-1]==t: s.stack.pop()
                  elif t in s.stack: s.stack.pop()
                  else: s.err.append(t)
          fail = False
          for f in sorted(os.listdir('.')):
              if f.endswith('.html'):
                  p = V(); p.feed(open(f).read())
                  status = 'OK' if not p.stack and not p.err else 'PB'
                  print(f"  {status} {f}")
                  if status == 'PB': fail = True
          sys.exit(1 if fail else 0)
          PY

      - name: Déploiement Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: '.'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Auto-deploy depuis ${{ github.sha }}"
          enable-pull-request-comment: true
          enable-commit-comment: false
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5
